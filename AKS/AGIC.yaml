apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress

  # annotations:
  #   kubernetes.io/ingress.class: azure/application-gateway
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/health-probe-path: /

spec:

  rules:

  - host: santansre.shop

    http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:

            name: frontend-service

            port:

              number: 80

      - path: /api/create

        pathType: Prefix

        backend:

          service:

            name: create-service

            port:

              number: 8000

      - path: /api/delete

        pathType: Prefix

        backend:

          service:

            name: delete-service

            port:

              number: 8000

      - path: /api/get

        pathType: Prefix

        backend:

          service:

            name: get-service

            port:

              number: 8000